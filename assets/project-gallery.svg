<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated glass project gallery</title>
  <desc id="desc">Four animated glassmorphism project cards in a lavender, peach, coral, and indigo palette.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a7a2ea"/>
      <stop offset="0.48" stop-color="#c9ace7"/>
      <stop offset="1" stop-color="#263c9d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="500" y2="230">
      <stop stop-color="#ffffff" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.13"/>
    </linearGradient>
    <linearGradient id="peach" x1="0" y1="0" x2="180" y2="100">
      <stop stop-color="#ffe0c9"/>
      <stop offset="1" stop-color="#ff6b7a"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#1d2f84" flood-opacity="0.22"/>
    </filter>
    <style>
      .title{font:800 32px Inter,Segoe UI,Arial,sans-serif;fill:#fff}
      .stack{font:700 18px Inter,Segoe UI,Arial,sans-serif;fill:#2f3f9f}
      .body{font:600 17px Inter,Segoe UI,Arial,sans-serif;fill:#eef0ff}
      .metric{font:800 18px Inter,Segoe UI,Arial,sans-serif;fill:#ffe0c9}
      .small{font:700 15px Inter,Segoe UI,Arial,sans-serif;fill:#263c9d}
    </style>
  </defs>
  <rect width="1200" height="620" rx="32" fill="url(#sky)"/>
  <circle cx="168" cy="112" r="122" fill="#ffe0c9" opacity="0.38" filter="url(#blur)">
    <animate attributeName="cx" values="168;230;168" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1015" cy="462" r="142" fill="#ff6b7a" opacity="0.23" filter="url(#blur)">
    <animate attributeName="cy" values="462;398;462" dur="9s" repeatCount="indefinite"/>
  </circle>
  <g transform="translate(600 180)" opacity="0.28" stroke="#fff" stroke-width="1.4">
    <path d="M0 0L-430 180M0 0L-245 325M0 0L-80 385M0 0L128 360M0 0L322 300M0 0L490 150"/>
    <path d="M0 0L-360 65M0 0L-195 -25M0 0L0 -80M0 0L198 -28M0 0L365 58"/>
    <animateTransform attributeName="transform" type="rotate" values="0 600 180;3 600 180;0 600 180;-3 600 180;0 600 180" dur="8s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(64 70)" filter="url(#shadow)">
    <rect width="510" height="210" rx="24" fill="url(#glass)" stroke="#fff" stroke-opacity="0.52"/>
    <circle cx="72" cy="74" r="34" fill="url(#peach)"/>
    <path d="M52 76h40M56 60l32 32M88 60L56 92" stroke="#263c9d" stroke-width="5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" values="0 72 76;360 72 76" dur="8s" repeatCount="indefinite"/>
    </path>
    <text x="128" y="62" class="title">SyncDraft</text>
    <text x="128" y="96" class="stack">CRDT + Serverless Realtime Editing</text>
    <text x="128" y="136" class="body">Deterministic conflict resolution, replayable logs,</text>
    <text x="128" y="162" class="body">and WebSocket sync across distributed replicas.</text>
    <text x="128" y="194" class="metric">~100% convergence | ~73ms sync</text>
    <animateTransform attributeName="transform" type="translate" values="64 70;64 58;64 70" dur="4s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(626 70)" filter="url(#shadow)">
    <rect width="510" height="210" rx="24" fill="url(#glass)" stroke="#fff" stroke-opacity="0.52"/>
    <circle cx="72" cy="74" r="34" fill="#263c9d" opacity="0.9"/>
    <path d="M48 66l24 18 24-18" stroke="#ffe0c9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="72" cy="75" r="9" fill="#ff6b7a">
      <animate attributeName="r" values="7;14;7" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="128" y="62" class="title">AI Email Automation</text>
    <text x="128" y="96" class="stack">LangGraph + RAG + FastAPI</text>
    <text x="128" y="136" class="body">Two-agent Gmail workflow with policy-aware</text>
    <text x="128" y="162" class="body">reply generation and real-time updates.</text>
    <text x="128" y="194" class="metric">~95% classification | ~3s pipeline</text>
    <animateTransform attributeName="transform" type="translate" values="626 70;626 84;626 70" dur="4.4s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(64 340)" filter="url(#shadow)">
    <rect width="510" height="210" rx="24" fill="url(#glass)" stroke="#fff" stroke-opacity="0.52"/>
    <circle cx="72" cy="74" r="34" fill="#ffe0c9" opacity="0.96"/>
    <path d="M72 45L42 95h60L72 45Z" stroke="#263c9d" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="72" cy="66" r="6" fill="#ff6b7a">
      <animate attributeName="cy" values="66;91;66" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="128" y="62" class="title">CausalCareNet</text>
    <text x="128" y="96" class="stack">Bayesian Networks + Counterfactuals</text>
    <text x="128" y="136" class="body">Uncertainty-aware causal framework for</text>
    <text x="128" y="162" class="body">multi-disease risk prediction and explanations.</text>
    <text x="128" y="194" class="metric">0.97 AUC | 35.76% risk reduction</text>
    <animateTransform attributeName="transform" type="translate" values="64 340;64 354;64 340" dur="4.7s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(626 340)" filter="url(#shadow)">
    <rect width="510" height="210" rx="24" fill="url(#glass)" stroke="#fff" stroke-opacity="0.52"/>
    <circle cx="72" cy="74" r="34" fill="#263c9d" opacity="0.9"/>
    <path d="M50 95V70M72 95V52M94 95V78" stroke="#ffe0c9" stroke-width="8" stroke-linecap="round"/>
    <path d="M48 62c18 8 28-18 48-6" stroke="#ff6b7a" stroke-width="5" stroke-linecap="round">
      <animate attributeName="d" values="M48 62c18 8 28-18 48-6;M48 58c17-9 31 14 48-10;M48 62c18 8 28-18 48-6" dur="3s" repeatCount="indefinite"/>
    </path>
    <text x="128" y="62" class="title">Fintech SaaS Backend</text>
    <text x="128" y="96" class="stack">Node.js + Prisma + PostgreSQL</text>
    <text x="128" y="136" class="body">Multi-tenant RBAC, accounting integrity,</text>
    <text x="128" y="162" class="body">audit-safe reversals, and secure auth flows.</text>
    <text x="128" y="194" class="metric">RBAC | OTP | double-entry ledger</text>
    <animateTransform attributeName="transform" type="translate" values="626 340;626 328;626 340" dur="4.2s" repeatCount="indefinite"/>
  </g>
</svg>
