<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Adya Pandey animated profile banner</title>
  <desc id="desc">Animated developer profile banner with moving code lines, neural nodes, and project chips.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.48" stop-color="#10263E"/>
      <stop offset="1" stop-color="#0F1B2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="170" y1="58" x2="1040" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="130" cy="90" r="70" fill="#38BDF8" opacity="0.16" filter="url(#soft)">
    <animate attributeName="cx" values="130;190;130" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1030" cy="300" r="95" fill="#22C55E" opacity="0.13" filter="url(#soft)">
    <animate attributeName="cy" values="300;245;300" dur="8s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.35" stroke="#93C5FD" stroke-width="1">
    <path d="M80 345 C250 275 310 380 470 300 S780 200 980 290 S1120 290 1170 225">
      <animate attributeName="d" dur="8s" repeatCount="indefinite"
        values="M80 345 C250 275 310 380 470 300 S780 200 980 290 S1120 290 1170 225;M80 330 C250 250 330 360 480 285 S780 230 980 260 S1120 310 1170 205;M80 345 C250 275 310 380 470 300 S780 200 980 290 S1120 290 1170 225"/>
    </path>
    <path d="M60 285 C250 235 390 300 520 235 S800 145 1040 215" opacity="0.7">
      <animate attributeName="d" dur="9s" repeatCount="indefinite"
        values="M60 285 C250 235 390 300 520 235 S800 145 1040 215;M60 275 C260 215 390 325 545 245 S790 160 1040 205;M60 285 C250 235 390 300 520 235 S800 145 1040 215"/>
    </path>
  </g>

  <g transform="translate(750 72)" opacity="0.96">
    <rect x="0" y="0" width="340" height="228" rx="18" fill="#0B1220" stroke="#334155"/>
    <circle cx="28" cy="28" r="6" fill="#F87171"/>
    <circle cx="50" cy="28" r="6" fill="#FBBF24"/>
    <circle cx="72" cy="28" r="6" fill="#34D399"/>
    <g font-family="Consolas, monospace" font-size="17">
      <text x="28" y="75" fill="#38BDF8">const</text>
      <text x="82" y="75" fill="#E2E8F0">builder = "Adya";</text>
      <text x="28" y="112" fill="#22C55E">focus</text>
      <text x="82" y="112" fill="#E2E8F0">= ["AI", "Backend"];</text>
      <text x="28" y="149" fill="#F59E0B">ship</text>
      <text x="78" y="149" fill="#E2E8F0">(systems);</text>
      <rect x="28" y="174" width="154" height="11" rx="5" fill="url(#accent)">
        <animate attributeName="width" values="70;245;154;290;70" dur="5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="82" y="126" fill="#E5F2FF" font-size="58" font-weight="800">Adya Pandey</text>
    <text x="86" y="172" fill="#BAE6FD" font-size="24" font-weight="600">
      Backend Systems + AI Engineering
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.2s" repeatCount="indefinite"/>
    </text>
    <text x="86" y="220" fill="#CBD5E1" font-size="19">3rd year AI &amp; Data Science student | ACM ICPC Regionalist</text>
    <text x="86" y="253" fill="#CBD5E1" font-size="19">FastAPI, Node.js, LangGraph, RAG, PostgreSQL, Redis, AWS</text>
  </g>

  <g transform="translate(86 298)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    <g>
      <rect width="142" height="38" rx="19" fill="#0F766E" opacity="0.92"/>
      <text x="20" y="25" fill="white">ML Systems</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -8;0 0" dur="3s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(160 0)">
      <rect width="158" height="38" rx="19" fill="#1D4ED8" opacity="0.92"/>
      <text x="20" y="25" fill="white">Distributed Apps</text>
      <animateTransform attributeName="transform" type="translate" values="160 0;160 -6;160 0" dur="3.5s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(338 0)">
      <rect width="154" height="38" rx="19" fill="#B45309" opacity="0.95"/>
      <text x="20" y="25" fill="white">Research Driven</text>
      <animateTransform attributeName="transform" type="translate" values="338 0;338 -7;338 0" dur="4s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
